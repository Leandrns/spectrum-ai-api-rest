spring.application.name=spectrum-ai-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===== DataSource (env vars conforme contrato: DATABASE_URL/USER/PASSWORD) =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/spectrum}
spring.datasource.username=${DATABASE_USER:spectrum}
spring.datasource.password=${DATABASE_PASSWORD:spectrum}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== Server =====
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.error.include-message=always
server.error.include-binding-errors=always

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===== springdoc / Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ===== Configurações específicas da aplicação =====
spectrum.security.jwt.secret=${JWT_SECRET:change-me-please-use-a-strong-random-base64-secret-with-at-least-256-bits}
spectrum.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
spectrum.security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
spectrum.security.jwt.issuer=spectrum-ai

spectrum.ai.provider=gemini
spectrum.ai.gemini.api-key=${GEMINI_API_KEY:}
spectrum.ai.gemini.model=gemini-1.5-pro
spectrum.ai.gemini.grounding-enabled=true
spectrum.ai.gemini.timeout-seconds=60

# ===== Logging =====
logging.level.com.spectrumai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO
