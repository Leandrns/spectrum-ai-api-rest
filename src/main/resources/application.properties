spring.application.name=spectrum-ai-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===== DataSource (env vars conforme contrato: DATABASE_URL/USER/PASSWORD) =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/spectrum}
spring.datasource.username=${DATABASE_USER:spectrum}
spring.datasource.password=${DATABASE_PASSWORD:spectrum}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Quando true, executa flyway repair() antes do migrate() na inicializacao.
# Use APENAS para resolver checksum mismatch apos editar uma migration ja
# aplicada. Desligue logo depois para preservar a validacao do Flyway.
spectrum.flyway.repair-on-start=${FLYWAY_REPAIR_ON_START:false}

# ===== Server =====
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Limites de payload para prevenir flooding/buffer overflow
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===== springdoc / Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ===== Configurações específicas da aplicação =====
spectrum.security.jwt.secret=${JWT_SECRET}
spectrum.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
spectrum.security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
spectrum.security.jwt.issuer=spectrum-ai

spectrum.ai.provider=gemini
spectrum.ai.gemini.api-key=${GEMINI_API_KEY:}
spectrum.ai.gemini.model=gemini-2.5-flash
spectrum.ai.gemini.grounding-enabled=true
spectrum.ai.gemini.timeout-seconds=120

# ===== FIPE API (uso exclusivo: popular vehicles_catalog) =====
spectrum.fipe.base-url=${FIPE_API_BASE_URL:https://fipe.parallelum.com.br/api/v2}
spectrum.fipe.api-token=${FIPE_API_TOKEN:}
spectrum.fipe.vehicle-type=${FIPE_VEHICLE_TYPE:cars}
spectrum.fipe.timeout-seconds=${FIPE_TIMEOUT_SECONDS:30}
spectrum.fipe.request-delay-ms=${FIPE_REQUEST_DELAY_MS:120}
# true = importa apenas Picapes e SUVs; false = importa todos os modelos da FIPE
spectrum.fipe.filter-segments=${FIPE_FILTER_SEGMENTS:true}
# Ano mínimo de produção: descarta modelos cujo year_to seja anterior a este valor
spectrum.fipe.min-year=${FIPE_MIN_YEAR:2022}

# ===== Segurança / CORS / HTTPS =====
# Lista de origens permitidas, separadas por vírgula. Use apenas domínios autorizados em produçãao.
spectrum.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}
spectrum.security.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
spectrum.security.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Cache-Control,Pragma,X-Request-Id,X-App-Platform,X-App-User-Agent,X-Signature,X-Signature-Timestamp}
spectrum.security.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization,X-Request-Id}
spectrum.security.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
spectrum.security.cors.max-age=3600
# Em produção defina como true
spectrum.security.require-https=${REQUIRE_HTTPS:false}

# ===== Rate limiting =====
spectrum.security.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
# Requisições por minuto por IP em endpoints gerais
spectrum.security.rate-limit.default-per-minute=${RATE_LIMIT_DEFAULT:120}
# Limite mais restrito em /v1/auth/** (proteger brute-force)
spectrum.security.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH:10}

# ===== Lockout de login (anti brute-force) =====
spectrum.security.lockout.enabled=${LOGIN_LOCKOUT_ENABLED:true}
spectrum.security.lockout.max-failures=${LOGIN_LOCKOUT_MAX:5}
spectrum.security.lockout.window-seconds=${LOGIN_LOCKOUT_WINDOW:900}

# ===== Criptografia em repouso (AES-GCM) =====
# Chave base64 de 32 bytes. Gere com: openssl rand -base64 32
spectrum.security.encryption.aes-key=${DATA_ENCRYPTION_KEY:}

# ===== Retenção de dados (LGPD) =====
spectrum.security.retention.enabled=${RETENTION_ENABLED:true}
# Searches concluídas são purgadas após N dias
spectrum.security.retention.searches-days=${RETENTION_SEARCHES_DAYS:730}
# Sessões inativas são purgadas após N dias
spectrum.security.retention.sessions-days=${RETENTION_SESSIONS_DAYS:730}
# Logs de auditoria são purgados após N dias
spectrum.security.retention.audit-days=${RETENTION_AUDIT_DAYS:365}
# Cron job diário às 3h
spectrum.security.retention.cron=${RETENTION_CRON:0 0 3 * * *}

# ===== Logging =====
logging.level.com.spectrumai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO
