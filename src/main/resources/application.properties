spring.application.name=spectrum-ai-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===== DataSource (env vars conforme contrato: DATABASE_URL/USER/PASSWORD) =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/spectrum}
spring.datasource.username=${DATABASE_USER:spectrum}
spring.datasource.password=${DATABASE_PASSWORD:spectrum}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== Server =====
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===== springdoc / Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ===== Configurações específicas da aplicação =====
spectrum.security.jwt.secret=${JWT_SECRET}
spectrum.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
spectrum.security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
spectrum.security.jwt.issuer=spectrum-ai

spectrum.ai.provider=gemini
spectrum.ai.gemini.api-key=${GEMINI_API_KEY:}
spectrum.ai.gemini.model=gemini-2.5-flash
spectrum.ai.gemini.grounding-enabled=true
spectrum.ai.gemini.timeout-seconds=120

# ===== FIPE API (uso exclusivo: popular vehicles_catalog) =====
spectrum.fipe.base-url=${FIPE_API_BASE_URL:https://fipe.parallelum.com.br/api/v2}
spectrum.fipe.api-token=${FIPE_API_TOKEN:}
spectrum.fipe.vehicle-type=${FIPE_VEHICLE_TYPE:cars}
spectrum.fipe.timeout-seconds=${FIPE_TIMEOUT_SECONDS:30}
spectrum.fipe.request-delay-ms=${FIPE_REQUEST_DELAY_MS:120}
# true = importa apenas Picapes e SUVs; false = importa todos os modelos da FIPE
spectrum.fipe.filter-segments=${FIPE_FILTER_SEGMENTS:true}
# Ano mínimo de produção: descarta modelos cujo year_to seja anterior a este valor
spectrum.fipe.min-year=${FIPE_MIN_YEAR:2022}

# ===== Logging =====
logging.level.com.spectrumai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO
