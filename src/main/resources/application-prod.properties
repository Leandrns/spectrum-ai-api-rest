spring.jpa.show-sql=false

spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never

# Atras de proxy reverso (Render, nginx, ALB) - respeita X-Forwarded-*
# para que request.isSecure(), getScheme(), getRemoteAddr() retornem
# o valor real do cliente, nao do proxy local.
server.forward-headers-strategy=framework

# Em producao, exigir HTTPS (atras de proxy com TLS termination)
spectrum.security.require-https=${REQUIRE_HTTPS:true}

logging.level.com.spectrumai=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
