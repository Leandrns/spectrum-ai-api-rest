spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.spectrumai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =============================================================
# DEFAULTS LOCAIS DE DEV - NUNCA USE EM PRODUCAO
# Estes valores so se aplicam quando o profile 'dev' esta ativo.
# Em prod o profile 'prod' e ativado e estas linhas nao tem efeito;
# as env vars JWT_SECRET / DATA_ENCRYPTION_KEY sao obrigatorias la.
# =============================================================

# JWT: chave HS256 de 64 bytes (>= 256 bits exigidos pelo jjwt)
spectrum.security.jwt.secret=${JWT_SECRET:dev-only-jwt-secret-please-override-with-env-var-in-production-environments-9f8a7b6c5d4e3f2a}

# AES-256 para criptografia em repouso: base64 de 32 bytes
spectrum.security.encryption.aes-key=${DATA_ENCRYPTION_KEY:tMqqtgaw62Mqbte6ZlZVncJmsNy3ZqwvUUk5ZPLFNwU=}

# Em dev libera CORS para Expo local e web
spectrum.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,http://localhost:3000,http://10.0.2.2:8081}

# Em dev o rate limit pode atrapalhar testes manuais - aumenta o teto
spectrum.security.rate-limit.default-per-minute=${RATE_LIMIT_DEFAULT:600}
spectrum.security.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH:60}
